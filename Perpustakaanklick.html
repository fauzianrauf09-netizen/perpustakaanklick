<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Perpustakaan Digital</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; color: var(--primary); }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        button.secondary { background: var(--secondary); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .status { padding: 4px 8px; border-radius: 6px; font-size: 0.85em; color: white; }
        .available { background: var(--success); }
        .borrowed { background: var(--danger); }
        
        .log-box { font-family: monospace; background: #0f172a; color: #38bdf8; padding: 15px; border-radius: 8px; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">📚 Sistem Manajemen Perpustakaan</h1>

    <div class="grid">
        <div class="card">
            <h2>Peminjaman</h2>
            <label>ID Anggota (1-3):</label>
            <input type="number" id="memberId" placeholder="Masukkan ID Anggota">
            
            <label>Pilih Buku:</label>
            <select id="bookSelect"></select>
            
            <button onclick="prosesPinjam()">Konfirmasi Pinjam</button>
        </div>

        <div class="card">
            <h2>Pengembalian</h2>
            <label>ID Buku:</label>
            <input type="text" id="returnBookId" placeholder="Contoh: B01">
            
            <label>Kondisi Terlambat? (Simulasi)</label>
            <select id="isLate">
                <option value="0">Tepat Waktu (Denda Rp0)</option>
                <option value="3">Terlambat 3 Hari (Denda Rp6.000)</option>
            </select>
            
            <button class="secondary" onclick="prosesKembali()">Proses Kembali</button>
        </div>
    </div>

    <div class="card">
        <h2>Koleksi Buku & Status</h2>
        <table id="bookTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Judul Buku</th>
                    <th>Status</th>
                    <th>Peminjam Aktif</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>System Console Log</h2>
        <div id="consoleLog" class="log-box"></div>
    </div>
</div>

<script>
    // DATA DATABASE (Simulasi)
    let books = [
        { id: "B01", judul: "Algoritma Pemrograman", status: "Tersedia", peminjam: "-" },
        { id: "B02", judul: "Struktur Data", status: "Tersedia", peminjam: "-" },
        { id: "B03", judul: "Web Development", status: "Tersedia", peminjam: "-" }
    ];

    let members = [
        { id: 1, nama: "Andi", pinjam: 0 },
        { id: 2, nama: "Budi", pinjam: 0 },
        { id: 3, nama: "Citra", pinjam: 3 } // Simulasi Citra sudah limit
    ];

    function writeLog(msg) {
        const log = document.getElementById("consoleLog");
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    function render() {
        const tbody = document.querySelector("#bookTable tbody");
        const select = document.querySelector("#bookSelect");
        tbody.innerHTML = "";
        select.innerHTML = "<option value=''>-- Pilih Buku --</option>";

        books.forEach(b => {
            const statusCls = b.status === "Tersedia" ? "available" : "borrowed";
            tbody.innerHTML += `<tr>
                <td>${b.id}</td>
                <td>${b.judul}</td>
                <td><span class="status ${statusCls}">${b.status}</span></td>
                <td>${b.peminjam}</td>
            </tr>`;
            
            if(b.status === "Tersedia") {
                select.innerHTML += `<option value="${b.id}">${b.judul}</option>`;
            }
        });
    }

    // ALGORITMA PEMINJAMAN
    function prosesPinjam() {
        const mId = parseInt(document.getElementById("memberId").value);
        const bId = document.getElementById("bookSelect").value;
        
        const member = members.find(m => m.id === mId);
        const book = books.find(b => b.id === bId);

        if(!member) return writeLog("ERROR: ID Anggota tidak ditemukan!");
        if(member.pinjam >= 3) return writeLog(`ERROR: ${member.nama} mencapai batas maks (3 buku)!`);
        if(!book) return writeLog("ERROR: Mohon pilih buku!");

        // Eksekusi
        book.status = "Dipinjam";
        book.peminjam = member.nama;
        member.pinjam++;
        
        writeLog(`SUKSES: ${member.nama} meminjam ${book.judul}.`);
        render();
    }

    // ALGORITMA PENGEMBALIAN
    function prosesKembali() {
        const bId = document.getElementById("returnBookId").value.toUpperCase();
        const lateDays = parseInt(document.getElementById("isLate").value);
        
        const book = books.find(b => b.id === bId);

        if(!book || book.status === "Tersedia") {
            return writeLog("ERROR: Buku tidak ditemukan atau tidak sedang dipinjam.");
        }

        const member = members.find(m => m.nama === book.peminjam);
        
        // Cek Denda
        if(lateDays > 0) {
            const denda = lateDays * 2000;
            writeLog(`INFO: Denda keterlambatan ${lateDays} hari: Rp${denda.toLocaleString()}`);
        }

        // Eksekusi Update
        member.pinjam--;
        book.status = "Tersedia";
        book.peminjam = "-";

        writeLog(`SUKSES: Buku ${book.judul} telah dikembalikan.`);
        render();
        document.getElementById("returnBookId").value = "";
    }

    render();
    writeLog("Sistem Siap. Silakan masukkan data.");
</script>

</body>
</html>
