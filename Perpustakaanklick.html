<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Manager - Sistem Terpadu</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--primary);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: auto; }

        header {
            text-align: center;
            padding: 40px 0;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        h2 { margin-top: 0; font-size: 1.25rem; border-bottom: 2px solid var(--light); padding-bottom: 10px; }

        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button.secondary { background-color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { background: var(--light); text-align: left; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
        .bg-available { background-color: var(--success); }
        .bg-borrowed { background-color: var(--danger); }

        .log-container {
            background: #1e293b;
            color: #94a3b8;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry { margin-bottom: 5px; border-left: 2px solid var(--accent); padding-left: 10px; }
        .log-time { color: var(--accent); margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Smart Library System</h1>
        <p>Sistem Peminjaman & Pengembalian Buku Terpadu</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>Peminjaman Buku</h2>
            <label>ID Anggota (1-3):</label>
            <input type="number" id="memberId" placeholder="Input ID Siswa (Contoh: 1)">
            
            <label>Pilih Koleksi Buku:</label>
            <select id="bookSelect"></select>
            
            <button onclick="logicPinjam()">Proses Peminjaman</button>
        </div>

        <div class="card">
            <h2>Pengembalian Buku</h2>
            <label>Scan ID Buku:</label>
            <input type="text" id="returnBookId" placeholder="Contoh: B001">
            
            <label>Status Keterlambatan:</label>
            <select id="lateStatus">
                <option value="0">Tepat Waktu (Denda Rp0)</option>
                <option value="1">Terlambat 1 Hari (Denda Rp2.000)</option>
                <option value="2">Terlambat 2 Hari (Denda Rp4.000)</option>
                <option value="5">Terlambat 5 Hari (Denda Rp10.000)</option>
            </select>
            
            <button class="secondary" onclick="logicKembali()">Proses Pengembalian</button>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h2>Koleksi Buku & Inventaris</h2>
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>ID Buku</th>
                    <th>Judul Buku</th>
                    <th>Status</th>
                    <th>Peminjam</th>
                    <th>Jatuh Tempo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h2>Log Aktivitas Sistem</h2>
        <div id="activityLog" class="log-container">
            <div class="log-entry">Sistem siap... Menunggu kedatangan siswa.</div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE SIMULASI ---
    let books = [
        { id: "B001", judul: "Fisika Modern", status: "Tersedia", peminjam: "-", due: "-" },
        { id: "B002", judul: "Biologi Dasar", status: "Tersedia", peminjam: "-", due: "-" },
        { id: "B003", judul: "Kimia Organik", status: "Tersedia", peminjam: "-", due: "-" },
        { id: "B004", judul: "Matematika Diskrit", status: "Tersedia", peminjam: "-", due: "-" }
    ];

    let members = [
        { id: 1, nama: "Rian", limit: 3, pinjam: 0, denda: 0 },
        { id: 2, nama: "Budi", limit: 3, pinjam: 0, denda: 0 },
        { id: 3, nama: "Citra", limit: 3, pinjam: 3, denda: 0 } // Simulasi limit penuh
    ];

    // --- FUNGSI UTAMA ---

    function addLog(message) {
        const log = document.getElementById("activityLog");
        const time = new Date().toLocaleTimeString();
        log.innerHTML = `<div class="log-entry"><span class="log-time">[${time}]</span> ${message}</div>` + log.innerHTML;
    }

    function render() {
        const tbody = document.querySelector("#inventoryTable tbody");
        const select = document.getElementById("bookSelect");
        
        tbody.innerHTML = "";
        select.innerHTML = '<option value="">-- Scan Barcode Buku --</option>';

        books.forEach(b => {
            const pillClass = b.status === "Tersedia" ? "bg-available" : "bg-borrowed";
            tbody.innerHTML += `
                <tr>
                    <td><strong>${b.id}</strong></td>
                    <td>${b.judul}</td>
                    <td><span class="status-pill ${pillClass}">${b.status}</span></td>
                    <td>${b.peminjam}</td>
                    <td>${b.due}</td>
                </tr>
            `;

            if (b.status === "Tersedia") {
                select.innerHTML += `<option value="${b.id}">${b.judul} (${b.id})</option>`;
            }
        });
    }

    // --- LOGIKA PEMINJAMAN ---
    function logicPinjam() {
        const mId = parseInt(document.getElementById("memberId").value);
        const bId = document.getElementById("bookSelect").value;
        
        const member = members.find(m => m.id === mId);
        const book = books.find(b => b.id === bId);

        // Tahap Validasi
        if (!member) {
            addLog("VALIDASI GAGAL: Siswa tidak ditemukan!");
            return;
        }
        if (member.pinjam >= member.limit) {
            addLog(`VALIDASI GAGAL: ${member.nama} sudah mencapai limit pinjam (Maks 3 buku).`);
            return;
        }
        if (!book) {
            addLog("VALIDASI GAGAL: Buku belum dipilih.");
            return;
        }

        // Tahap Eksekusi
        const dueDate = new Date();
        dueDate.setDate(dueDate.getDate() + 7);
        
        book.status = "Dipinjam";
        book.peminjam = member.nama;
        book.due = dueDate.toLocaleDateString('id-ID');
        member.pinjam++;

        addLog(`PEMINJAMAN BERHASIL: ${member.nama} meminjam "${book.judul}". Jatuh tempo: ${book.due}`);
        render();
    }

    // --- LOGIKA PENGEMBALIAN ---
    function logicKembali() {
        const bId = document.getElementById("returnBookId").value.toUpperCase();
        const lateDays = parseInt(document.getElementById("lateStatus").value);
        
        const book = books.find(b => b.id === bId);

        if (!book || book.status === "Tersedia") {
            addLog("ERROR: Data tidak valid. Buku tidak terdaftar sebagai buku keluar.");
            return;
        }

        const member = members.find(m => m.nama === book.peminjam);
        
        // Cek Denda
        if (lateDays > 0) {
            const dendaTotal = lateDays * 2000;
            addLog(`KETERLAMBATAN: ${member.nama} terlambat ${lateDays} hari. Denda Rp${dendaTotal.toLocaleString()}.`);
        }

        // Tahap Penyelesaian
        member.pinjam--;
        book.status = "Tersedia";
        book.peminjam = "-";
        book.due = "-";

        addLog(`PENGEMBALIAN BERHASIL: Buku "${book.judul}" kembali ke rak. Kuota ${member.nama} diperbarui.`);
        document.getElementById("returnBookId").value = "";
        render();
    }

    // Jalankan render awal
    render();
</script>

</body>
</html>
