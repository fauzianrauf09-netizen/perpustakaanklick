<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library - Sistem Peminjaman Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: auto; }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        h2 { margin-top: 0; font-size: 1.2rem; color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }

        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover { background-color: #1d4ed8; transform: translateY(-2px); }
        .btn-return { background-color: var(--dark); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; overflow: hidden; border-radius: 10px; }
        th { background: #f1f5f9; text-align: left; padding: 15px; font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

        .badge {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
        .bg-available { background-color: var(--success); }
        .bg-borrowed { background-color: var(--danger); }

        .log-box {
            background: #0f172a;
            color: #38bdf8;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            height: 200px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-top: 10px;
        }

        .alert-msg { padding: 10px; border-radius: 8px; margin-top: 10px; display: none; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Smart Library Manager</h1>
        <p>Sistem Peminjaman & Pengembalian Buku Otomatis</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>Peminjaman (Check-out)</h2>
            <label>Pilih Anggota:</label>
            <select id="siswaInput">
                <option value="">-- Pilih Nama Siswa --</option>
                <option value="1">Fauzan Fatih Tolinggilo (ID: 001)</option>
                <option value="2">Azzam Suratinojo (ID: 002)</option>
                <option value="3">Fauzia Nurazizah Rauf (ID: 003)</option>
                <option value="4">Moh.Rayhan Panggi (ID: 004)</option>
                <option value="5">Nurain Ngadu (ID: 005)</option>
                <option value="6">Annisa Salsabila Badu (ID: 006)</option>
                <option value="4">Moh.Rayhan Panggi (ID: 004)</option>
                <option value="4">Moh.Rayhan Panggi (ID: 004)</option>
                <option value="4">Moh.Rayhan Panggi (ID: 004)</option>
                <option value="4">Moh.Rayhan Panggi (ID: 004)</option>
                <option value="4">Moh.Rayhan Panggi (ID: 004)</option>
                <option value="4">Moh.Rayhan Panggi (ID: 004)</option>
            </select>
            
            <label>Pilih Buku:</label>
            <select id="bukuSelect"></select>
            
            <button onclick="prosesPinjam()">Pinjam Buku Sekarang</button>
        </div>

        <div class="card">
            <h2>Pengembalian (Check-in)</h2>
            <label>Masukkan ID Buku:</label>
            <input type="text" id="kembaliBukuId" placeholder="Contoh: B-001">
            
            <label>Keterlambatan:</label>
            <select id="lateDays">
                <option value="0">Tepat Waktu (Rp 0)</option>
                <option value="1">Terlambat 1 Hari (Rp 2.000)</option>
                <option value="3">Terlambat 3 Hari (Rp 6.000)</option>
                <option value="7">Terlambat 7 Hari (Rp 14.000)</option>
            </select>
            
            <button class="btn-return" onclick="prosesKembali()">Proses Pengembalian</button>
        </div>
    </div>

    <div class="card" style="margin-top:25px;">
        <h2>Koleksi Buku & Status Real-time</h2>
        <div style="overflow-x: auto;">
            <table id="tabelBuku">
                <thead>
                    <tr>
                        <th>KODE</th>
                        <th>JUDUL BUKU</th>
                        <th>STATUS</th>
                        <th>PEMINJAM</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="card" style="margin-top:25px;">
        <h2>System Activity Log (Algoritma)</h2>
        <div id="systemLog" class="log-box">Sistem Berhasil Dimuat... Menunggu Transaksi.</div>
    </div>
</div>

<script>
    // Database Internal
    let databaseBuku = [
        { id: "B-001", judul: "Fisika Modern", status: "Tersedia", peminjam: "-" },
        { id: "B-002", judul: "Algoritma Cerdas", status: "Tersedia", peminjam: "-" },
        { id: "B-003", judul: "Sains Masa Depan", status: "Tersedia", peminjam: "-" },
        { id: "B-004", judul: "Matematika Diskrit", status: "Tersedia", peminjam: "-" }
    ];

    let databaseSiswa = [
        { id: 1, nama: "Rian", pinjam: 0, limit: 3 },
        { id: 2, nama: "Budi", pinjam: 0, limit: 3 },
        { id: 3, nama: "Citra", pinjam: 3, limit: 3 } // Simulasi limit penuh
    ];

    function updateLog(pesan) {
        const logBox = document.getElementById("systemLog");
        const waktu = new Date().toLocaleTimeString();
        logBox.innerHTML = `[${waktu}] > ${pesan}<br>` + logBox.innerHTML;
    }

    function renderTabel() {
        const tbody = document.querySelector("#tabelBuku tbody");
        const selectBuku = document.getElementById("bukuSelect");
        
        tbody.innerHTML = "";
        selectBuku.innerHTML = '<option value="">-- Pilih Buku Tersedia --</option>';

        databaseBuku.forEach(buku => {
            const statusClass = buku.status === "Tersedia" ? "bg-available" : "bg-borrowed";
            tbody.innerHTML += `<tr>
                <td><b>${buku.id}</b></td>
                <td>${buku.judul}</td>
                <td><span class="badge ${statusClass}">${buku.status}</span></td>
                <td>${buku.peminjam}</td>
            </tr>`;

            if (buku.status === "Tersedia") {
                selectBuku.innerHTML += `<option value="${buku.id}">${buku.judul}</option>`;
            }
        });
    }

    function prosesPinjam() {
        const sId = document.getElementById("siswaInput").value;
        const bId = document.getElementById("bukuSelect").value;
        
        const siswa = databaseSiswa.find(s => s.id == sId);
        const buku = databaseBuku.find(b => b.id == bId);

        if (!siswa) return alert("Pilih siswa terlebih dahulu!");
        if (!buku) return alert("Pilih buku terlebih dahulu!");

        // ALGORITMA VALIDASI
        if (siswa.pinjam >= siswa.limit) {
            updateLog(`ERROR: ${siswa.nama} gagal pinjam. Limit pinjaman (3) sudah penuh!`);
            alert("Batas peminjaman tercapai!");
            return;
        }

        // PROSES
        buku.status = "Dipinjam";
        buku.peminjam = siswa.nama;
        siswa.pinjam++;

        updateLog(`SUKSES: ${siswa.nama} berhasil meminjam buku "${buku.judul}".`);
        renderTabel();
    }

    function prosesKembali() {
        const bId = document.getElementById("kembaliBukuId").value.trim().toUpperCase();
        const dendaPerHari = 2000;
        const hariTelat = parseInt(document.getElementById("lateDays").value);
        
        const buku = databaseBuku.find(b => b.id.toUpperCase() == bId);

        if (!buku || buku.status === "Tersedia") {
            updateLog(`ERROR: Buku ${bId} tidak ditemukan dalam daftar pinjam.`);
            alert("Buku tidak ditemukan!");
            return;
        }

        const siswa = databaseSiswa.find(s => s.nama == buku.peminjam);
        
        // HITUNG DENDA
        if (hariTelat > 0) {
            const totalDenda = hariTelat * dendaPerHari;
            updateLog(`DENDA: ${siswa.nama} membayar Rp ${totalDenda.toLocaleString()} (Telat ${hariTelat} hari).`);
        }

        // UPDATE STATUS
        siswa.pinjam--;
        buku.status = "Tersedia";
        buku.peminjam = "-";

        updateLog(`SUKSES: Buku "${buku.judul}" telah dikembalikan oleh ${siswa.nama}.`);
        document.getElementById("kembaliBukuId").value = "";
        renderTabel();
    }

    // Inisialisasi awal
    renderTabel();
</script>

</body>
</html>
